name: drishti_link
description: Drishti-Link — AI navigation companion for visually impaired users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_database: ^10.4.9
  firebase_messaging: ^14.7.19

  # ── Google Sign-In ──────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Navigation ──────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Network / Real-time ─────────────────────────────────────────
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.0
  http: ^1.2.0

  # ── Location ────────────────────────────────────────────────────
  geolocator: ^11.0.0

  # ── Secure Storage ──────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Utilities ───────────────────────────────────────────────────
  uuid: ^4.3.3
  intl: ^0.19.0

  # ── Voice / TTS ─────────────────────────────────────────────────
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.0

  # ── Animations ──────────────────────────────────────────────────
  flutter_animate: ^4.5.0

  # ── Onboarding UI ───────────────────────────────────────────────
  smooth_page_indicator: ^1.1.0

  # ── Typography ──────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── State management ────────────────────────────────────────────
  provider: ^6.1.2

  # ── Biometric auth (fingerprint + Face ID) ──────────────────────
  local_auth: ^2.1.8

  # ── Runtime permissions (camera, location) ──────────────────────
  permission_handler: ^11.3.0

  # ── Haptic / vibration alerts ───────────────────────────────────
  vibration: ^2.0.0

  # ── Camera feed (live obstacle detection) ───────────────────────
  camera: ^0.10.5+9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
