[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn main:app --bind 0.0.0.0:${PORT:-8000} --workers 4 --worker-class uvicorn.workers.UvicornWorker --keep-alive 2 --timeout 120 --graceful-timeout 30"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
APP_ENV = "production"
DEBUG = "False"
# Note: Database URLs and Base64 JSON keys must be defined
# strictly within the Railway Dashboard UI variables tab.
